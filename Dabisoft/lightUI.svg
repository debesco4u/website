<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"></stop>
      <stop offset="50%" stop-color="#2c5364"></stop>
      <stop offset="100%" stop-color="#00c853"></stop>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer rounded square -->
  <rect x="20" y="20" width="120" height="120" rx="24" fill="none" stroke="url(#grad2)" stroke-width="4"></rect>

  <!-- Inner modular blocks -->
  <rect x="45" y="45" width="25" height="25" rx="6" fill="#00c853"></rect>
  <rect x="90" y="45" width="25" height="25" rx="6" fill="#2c5364"></rect>
  <rect x="45" y="90" width="25" height="25" rx="6" fill="#2c5364"></rect>
  <rect x="90" y="90" width="25" height="25" rx="6" fill="#00c853"></rect>

  <!-- Connection lines -->
  <line x1="70" y1="57" x2="90" y2="57" stroke="#00c853" stroke-width="2"></line>
  <line x1="57" y1="70" x2="57" y2="90" stroke="#00c853" stroke-width="2"></line>
  <line x1="103" y1="70" x2="103" y2="90" stroke="#00c853" stroke-width="2"></line>
  <line x1="70" y1="103" x2="90" y2="103" stroke="#00c853" stroke-width="2"></line>

  <!-- Pulsing glow -->
  <circle cx="80" cy="80" r="8" fill="#d32f2f" opacity="0.35" filter="url(#glow)">
    <animate attributeName="r" values="8;12;8" dur="1.8s" repeatCount="indefinite"></animate>
    <animate attributeName="opacity" values="0.35;0.15;0.35" dur="1.8s" repeatCount="indefinite"></animate>
  </circle>

  <!-- Core node -->
  <circle cx="80" cy="80" r="5" fill="#d32f2f">
    <animate attributeName="r" values="5;6;5" dur="1.8s" repeatCount="indefinite"></animate>
  </circle>
</svg>