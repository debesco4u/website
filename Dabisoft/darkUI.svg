<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brighter gradient for dark mode -->
    <linearGradient id="gradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e676"></stop>
      <stop offset="100%" stop-color="#00c853"></stop>
    </linearGradient>

    <!-- Stronger glow for dark UI -->
    <filter id="glowDark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect x="0" y="0" width="160" height="160" rx="28" fill="#0b0f14"></rect>

  <!-- Outer rounded square -->
  <rect x="20" y="20" width="120" height="120" rx="24" fill="none" stroke="url(#gradDark)" stroke-width="4"></rect>

  <!-- Inner modular blocks -->
  <rect x="45" y="45" width="25" height="25" rx="6" fill="#00e676"></rect>
  <rect x="90" y="45" width="25" height="25" rx="6" fill="#1b2a34"></rect>
  <rect x="45" y="90" width="25" height="25" rx="6" fill="#1b2a34"></rect>
  <rect x="90" y="90" width="25" height="25" rx="6" fill="#00e676"></rect>

  <!-- Connection lines -->
  <line x1="70" y1="57" x2="90" y2="57" stroke="#00e676" stroke-width="2"></line>
  <line x1="57" y1="70" x2="57" y2="90" stroke="#00e676" stroke-width="2"></line>
  <line x1="103" y1="70" x2="103" y2="90" stroke="#00e676" stroke-width="2"></line>
  <line x1="70" y1="103" x2="90" y2="103" stroke="#00e676" stroke-width="2"></line>

  <!-- Pulsing glow -->
  <circle cx="80" cy="80" r="9" fill="#ff3d00" opacity="0.4" filter="url(#glowDark)">
    <animate attributeName="r" values="9;14;9" dur="1.8s" repeatCount="indefinite"></animate>
    <animate attributeName="opacity" values="0.4;0.15;0.4" dur="1.8s" repeatCount="indefinite"></animate>
  </circle>

  <!-- Core node -->
  <circle cx="80" cy="80" r="5.5" fill="#ff3d00">
    <animate attributeName="r" values="5.5;6.5;5.5" dur="1.8s" repeatCount="indefinite"></animate>
  </circle>
</svg>